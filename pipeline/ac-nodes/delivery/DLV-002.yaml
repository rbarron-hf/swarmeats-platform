ac_node:
  id: "DLV-002"
  bounded_context: "Delivery"
  aggregate_root: "Delivery"
  behaviour_name: "Assign Driver"
  trigger: "HTTP POST /deliveries/{deliveryId}/assign"
  azure_function: "AssignDriverFunction"
  given:
    - "A delivery exists in the deliveries container"
    - "The delivery is in AwaitingDriver status"
    - "The driver specified by driverId has no active delivery (no delivery in DriverAssigned or PickedUp status for this driver)"
    - "The driver's current location is within 5km of the restaurant address (calculated via Haversine formula)"
  when:
    - "A POST request is made to /deliveries/{deliveryId}/assign with driverId and driverLocation (latitude, longitude)"
  then:
    - "The delivery status transitions from AwaitingDriver to DriverAssigned"
    - "The driverId is recorded on the delivery"
    - "The driver's initial location is stored as the current DriverLocation"
    - "The EstimatedArrival is calculated based on the driver's location and the delivery route"
    - "A DriverAssigned domain event is raised and published to topic delivery.driver-assigned"
    - "The delivery document is deleted from the 'unassigned' partition and recreated under the driver's partition key (/driverId)"
    - "HTTP 200 is returned with the updated delivery (status = DriverAssigned)"
  error_conditions:
    - condition: "Delivery not found"
      expected: "HTTP 404 returned"
      error_code: "DELIVERY_NOT_FOUND"
    - condition: "Delivery not in AwaitingDriver status (already assigned)"
      expected: "HTTP 409 returned"
      error_code: "DELIVERY_ALREADY_ASSIGNED"
    - condition: "Driver already has an active delivery (in DriverAssigned or PickedUp status)"
      expected: "HTTP 409 returned"
      error_code: "DRIVER_NOT_AVAILABLE"
    - condition: "Driver is more than 5km from the restaurant (Haversine distance)"
      expected: "HTTP 400 returned"
      error_code: "DRIVER_TOO_FAR"
  data_contracts:
    request_schema: "{ driverId: Guid, driverLocation: { latitude: decimal, longitude: decimal } }"
    response_schema: "{ deliveryId: Guid, orderId: Guid, status: string, driverId: Guid, driverLocation: { latitude: decimal, longitude: decimal, recordedAt: DateTimeOffset }, route: { pickup: { street: string, city: string, postcode: string, latitude: decimal, longitude: decimal }, dropoff: { street: string, city: string, postcode: string, latitude: decimal, longitude: decimal } }, estimatedArrival: { estimatedArrivalTime: DateTimeOffset, estimatedMinutes: int } }"
    domain_events:
      - event_name: "DriverAssigned"
        target: "delivery.driver-assigned"
        payload_fields:
          - name: "deliveryId"
            type: "Guid"
          - name: "orderId"
            type: "Guid"
          - name: "driverId"
            type: "Guid"
          - name: "estimatedArrivalMinutes"
            type: "int"
          - name: "assignedAt"
            type: "DateTimeOffset"
  dependencies:
    - context: "Delivery"
      type: "internal"
      description: "Queries the deliveries container across the driver's partition to check for existing active deliveries (DriverAssigned or PickedUp status) to enforce DLV-R01."
  estimated_complexity: 6
  story_type: "backend"
  notes: "High complexity due to three factors: (1) Haversine distance calculation between driver location and restaurant coordinates, (2) partition key migration from 'unassigned' sentinel to the driver's partition key requiring delete + recreate, (3) cross-partition query to check driver availability across all deliveries. The driver availability check requires querying the deliveries container for any document with the given driverId in DriverAssigned or PickedUp status."
