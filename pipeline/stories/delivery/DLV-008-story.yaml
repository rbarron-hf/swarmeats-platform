story:
  id: "DLV-008-STORY"
  ac_node_ref: "DLV-008"
  bounded_context: "Delivery"
  epic: "Delivery Lifecycle Management"
  feature: "Operational Monitoring"
  title: "Monitor unassigned deliveries exceeding wait threshold"
  user_story: >
    As the system, I need to periodically check for deliveries that have been
    awaiting a driver for more than 5 minutes so that operations teams are
    alerted and can take corrective action.
  acceptance_criteria:
    - id: "DLV-008-AC-01"
      given: >
        Some deliveries exist in the deliveries container in AwaitingDriver
        status and some of these deliveries have been in AwaitingDriver status
        for more than 5 minutes
      when: >
        The timer fires (every 30 seconds)
      then: >
        The function queries the deliveries container for all deliveries in
        AwaitingDriver status with createdAt older than 5 minutes
    - id: "DLV-008-AC-02"
      given: >
        Overdue deliveries are found
      when: >
        The timer fires (every 30 seconds)
      then: >
        For each overdue delivery found, a warning is logged with delivery
        details
    - id: "DLV-008-AC-03"
      given: >
        Overdue deliveries are found
      when: >
        The timer fires (every 30 seconds)
      then: >
        A metric counter is incremented for each overdue delivery (for
        operational dashboards and alerting)
  error_scenarios:
    - id: "DLV-008-ERR-01"
      condition: "No overdue deliveries found"
      expected_behaviour: "Function completes silently with no warnings logged"
      error_code: "N/A"
  story_dependencies:
    - story_id: "DLV-001-STORY"
      reason: "Deliveries must exist in AwaitingDriver status before they can be monitored"
  story_type: "infrastructure"
  estimated_points: 2
  ddd_pattern: "monitoring"
  ddd_notes: >
    Operational monitoring function. Does NOT auto-assign drivers. Queries the
    'unassigned' sentinel partition key since all AwaitingDriver deliveries
    are stored under that partition. Timer trigger runs every 30 seconds. No
    domain events raised.
  azure_function: "UnassignedDeliveryCheckFunction"
  trigger_type: "Timer (*/30 * * * * *)"
  traceability:
    fdd_sections:
      - "5.7 Timer Trigger: Unassigned Delivery Check"
    ac_node_ids:
      - "DLV-008"
