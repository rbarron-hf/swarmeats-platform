context_map:
  generated_at: "2026-03-03T00:00:00Z"

  relationships:
    - upstream: "Orders"
      downstream: "Restaurant"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: orders.placed | Event: OrderPlaced | Subscription: restaurant-sub"
      notes: "Restaurant creates a RestaurantOrder in Pending status upon receiving OrderPlaced. Validates menu items and operating hours; auto-rejects if validation fails."

    - upstream: "Orders"
      downstream: "Restaurant"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: orders.cancelled | Event: OrderCancelled | Subscription: restaurant-sub"
      notes: "If restaurant order is still Pending, mark as cancelled. If already Accepted or later, log a warning."

    - upstream: "Orders"
      downstream: "Delivery"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: orders.cancelled | Event: OrderCancelled | Subscription: delivery-sub"
      notes: "If delivery is in AwaitingDriver status, cancel the delivery. If driver already assigned or picked up, log a warning."

    - upstream: "Restaurant"
      downstream: "Orders"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: restaurant.order-accepted | Event: OrderAccepted | Subscription: orders-sub"
      notes: "Orders context transitions order status from Placed to Accepted."

    - upstream: "Restaurant"
      downstream: "Orders"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: restaurant.order-rejected | Event: OrderRejected | Subscription: orders-sub"
      notes: "Orders context transitions order status from Placed to Rejected."

    - upstream: "Restaurant"
      downstream: "Orders"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: restaurant.order-ready | Event: OrderReadyForPickup | Subscription: orders-sub"
      notes: "Orders context transitions order status from Preparing to ReadyForPickup."

    - upstream: "Restaurant"
      downstream: "Delivery"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: restaurant.order-ready | Event: OrderReadyForPickup | Subscription: delivery-sub"
      notes: "Delivery context creates a new Delivery in AwaitingDriver status with restaurant address as pickup and order delivery address as dropoff."

    - upstream: "Delivery"
      downstream: "Orders"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: delivery.driver-assigned | Event: DriverAssigned | Subscription: orders-sub"
      notes: "Orders context transitions order status from ReadyForPickup to InDelivery."

    - upstream: "Delivery"
      downstream: "Orders"
      integration_pattern: "event_driven"
      contract_type: "Service Bus topic"
      contract_details: "Topic: delivery.completed | Event: DeliveryCompleted | Subscription: orders-sub"
      notes: "Orders context transitions order status from InDelivery to Delivered."

  azure_infrastructure:
    - bounded_context: "Orders"
      resources:
        - type: "Azure Function App"
          name: "func-orders"
          purpose: "Hosts Orders API endpoints (PlaceOrder, CancelOrder, GetOrder, GetOrdersByCustomer) and event handlers for consumed events (OrderAccepted, OrderRejected, OrderReadyForPickup, DriverAssigned, DeliveryCompleted)."
        - type: "Cosmos DB Container"
          name: "orders"
          purpose: "Stores order aggregate documents. Partition key: /customerId. No TTL. Long-lived order records."
        - type: "Cosmos DB Container"
          name: "orders-outbox"
          purpose: "Outbox pattern container for reliable event publishing. Partition key: /orderId. TTL: 7 days."
        - type: "Service Bus Topic"
          name: "orders.placed"
          purpose: "Publishes OrderPlaced events when a customer places an order."
        - type: "Service Bus Topic"
          name: "orders.cancelled"
          purpose: "Publishes OrderCancelled events when a customer cancels an order."
        - type: "Service Bus Subscription"
          name: "orders-sub on restaurant.order-accepted"
          purpose: "Orders context subscribes to restaurant.order-accepted topic to receive OrderAccepted events."
        - type: "Service Bus Subscription"
          name: "orders-sub on restaurant.order-rejected"
          purpose: "Orders context subscribes to restaurant.order-rejected topic to receive OrderRejected events."
        - type: "Service Bus Subscription"
          name: "orders-sub on restaurant.order-ready"
          purpose: "Orders context subscribes to restaurant.order-ready topic to receive OrderReadyForPickup events."
        - type: "Service Bus Subscription"
          name: "orders-sub on delivery.driver-assigned"
          purpose: "Orders context subscribes to delivery.driver-assigned topic to receive DriverAssigned events."
        - type: "Service Bus Subscription"
          name: "orders-sub on delivery.completed"
          purpose: "Orders context subscribes to delivery.completed topic to receive DeliveryCompleted events."

    - bounded_context: "Restaurant"
      resources:
        - type: "Azure Function App"
          name: "func-restaurant"
          purpose: "Hosts Restaurant API endpoints (GetMenu, GetActiveOrders, AcceptOrder, RejectOrder, UpdatePreparationStatus), event handlers for consumed events (OrderPlaced, OrderCancelled), and Change Feed trigger for active order dashboard projection."
        - type: "Cosmos DB Container"
          name: "menus"
          purpose: "Stores restaurant menu documents. Partition key: /restaurantId. No TTL. One menu document per restaurant."
        - type: "Cosmos DB Container"
          name: "restaurant-orders"
          purpose: "Stores incoming restaurant order documents. Partition key: /restaurantId. TTL: 30 days."
        - type: "Cosmos DB Container"
          name: "restaurant-outbox"
          purpose: "Outbox pattern container for reliable event publishing. Partition key: /restaurantId. TTL: 7 days."
        - type: "Service Bus Topic"
          name: "restaurant.order-accepted"
          purpose: "Publishes OrderAccepted events when restaurant staff accept an order."
        - type: "Service Bus Topic"
          name: "restaurant.order-rejected"
          purpose: "Publishes OrderRejected events when restaurant staff reject an order or auto-rejection occurs."
        - type: "Service Bus Topic"
          name: "restaurant.order-ready"
          purpose: "Publishes OrderReadyForPickup events when restaurant staff signal food is ready for driver pickup."
        - type: "Service Bus Subscription"
          name: "restaurant-sub on orders.placed"
          purpose: "Restaurant context subscribes to orders.placed topic to receive OrderPlaced events and create RestaurantOrder records."
        - type: "Service Bus Subscription"
          name: "restaurant-sub on orders.cancelled"
          purpose: "Restaurant context subscribes to orders.cancelled topic to receive OrderCancelled events and cancel pending restaurant orders."

    - bounded_context: "Delivery"
      resources:
        - type: "Azure Function App"
          name: "func-delivery"
          purpose: "Hosts Delivery API endpoints (GetDeliveryStatus, GetEstimatedArrival, AssignDriver, UpdateDriverLocation, ConfirmPickup, CompleteDelivery), event handlers for consumed events (OrderReadyForPickup, OrderCancelled), and timer trigger for unassigned delivery monitoring (runs every 30 seconds)."
        - type: "Cosmos DB Container"
          name: "deliveries"
          purpose: "Stores delivery aggregate documents. Partition key: /driverId. TTL: 30 days. Uses sentinel value unassigned for AwaitingDriver deliveries; document is recreated under driver partition key upon assignment."
        - type: "Cosmos DB Container"
          name: "deliveries-outbox"
          purpose: "Outbox pattern container for reliable event publishing. Partition key: /deliveryId. TTL: 7 days."
        - type: "Service Bus Topic"
          name: "delivery.driver-assigned"
          purpose: "Publishes DriverAssigned events when a driver is assigned to a delivery."
        - type: "Service Bus Topic"
          name: "delivery.completed"
          purpose: "Publishes DeliveryCompleted events when a driver completes a delivery."
        - type: "Service Bus Subscription"
          name: "delivery-sub on restaurant.order-ready"
          purpose: "Delivery context subscribes to restaurant.order-ready topic to receive OrderReadyForPickup events and create Delivery records."
        - type: "Service Bus Subscription"
          name: "delivery-sub on orders.cancelled"
          purpose: "Delivery context subscribes to orders.cancelled topic to receive OrderCancelled events and cancel awaiting deliveries."
