routing_decision:
  story_id: "DLV-002"
  bounded_context: "Delivery"
  scores:
    ac_node_count: 0        # 1 AC node -> 0
    file_surface_area: 2    # Command handler, Haversine calculator, driver availability query, partition migration logic (delete+recreate), DriverAssigned event, outbox, aggregate update, validator, request/response DTOs, tests -> 11+ files -> 2
    integration_boundaries: 0  # Internal cross-partition query only, no cross-context dependencies -> 0
    shared_aggregate: 0     # Delivery aggregate owned solely by Delivery context -> 0
    error_condition_density: 1  # 4 error conditions (DELIVERY_NOT_FOUND, DELIVERY_ALREADY_ASSIGNED, DRIVER_NOT_AVAILABLE, DRIVER_TOO_FAR) -> 1
    domain_logic_depth: 2   # Haversine distance calculation (5km radius check), cross-partition driver availability query, Cosmos DB partition key migration (delete 'unassigned' + recreate under driverId) -> 2
    estimated_complexity: 2  # Complexity 6 -> 2
  total_score: 7
  routing: "single_agent_with_subagents"
  override_applied: "domain_logic_depth=2 AND core command -> capped at single_agent_with_subagents"
  rationale: "AssignDriver is the most complex node in the Delivery context with three distinct technical challenges: (1) Haversine formula for straight-line distance calculation to enforce the 5km proximity rule, (2) cross-partition query to verify driver has no active delivery in DriverAssigned or PickedUp status, and (3) Cosmos DB partition key migration from 'unassigned' sentinel to the driver's partition key requiring a transactional delete + recreate. These justify subagent delegation."
  recommended_subagent_tasks:
    - "Implement Haversine distance calculation utility for 5km driver proximity check"
    - "Implement cross-partition driver availability query (check for existing DriverAssigned/PickedUp deliveries)"
    - "Implement partition key migration logic (delete from 'unassigned' partition, recreate under driverId partition)"
    - "Implement AssignDriverFunction command handler with DriverAssigned event via outbox pattern"
    - "Write unit tests for all 4 error conditions and happy path including distance boundary cases"
  recommended_swarm_workers: []
