        test structures from scratch.
      affected_contexts:
        - "Orders"
        - "Restaurant"
        - "Delivery"
      recommended_action: >
        Run Layer 3b test scaffold generation for all 27 stories to produce unit test
        templates covering happy paths and error scenarios, integration test templates
        for event handlers, and contract test templates for cross-context event payloads.
    - id: "WARN-002"
      check: "Check 2 — Integration Event Coverage"
      severity: "warning"
      description: >
        The OrderReadyForPickup event is consumed by both the Delivery context (DLV-001)
        and the Orders context (ORD-007), but the FDD messaging table (section 6.1) lists
        only Delivery as a subscriber to restaurant.order-ready. The system-map.yaml and
        context-map.yaml correctly include the Orders context subscription, but the FDD
        table is incomplete. This is a documentation inconsistency, not a functional gap,
        since the pipeline artifacts are correct.
      affected_contexts:
        - "Orders"
        - "Restaurant"
      recommended_action: >
        Update the FDD section 6.1 messaging table to include Orders as a subscriber to
        the restaurant.order-ready topic alongside Delivery. The pipeline artifacts
        (system-map.yaml, context-map.yaml) already reflect the correct subscriptions.
