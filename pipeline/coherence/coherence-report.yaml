  critical_flags:
    - id: "CRIT-001"
      check: "Check 2 — Integration Event Coverage / Check 4 — Cross-Context Contract Consistency"
      severity: "critical"
      description: >
        The OrderReadyForPickup event payload (defined in system-map.yaml, FDD section 4.6,
        and RST-007 AC node) contains: orderId, restaurantId, restaurantAddress, readyAt.
        However, the consuming AC node DLV-001 (Handle OrderReadyForPickup Event) expects
        a deliveryAddress field in the event payload to set the Delivery Route dropoff
        location. The deliveryAddress is NOT part of the OrderReadyForPickup event schema
        as defined by the producing context (Restaurant). This means DLV-001 cannot
        construct the Route value object (pickup + dropoff) from the event alone.
        The FDD section 5.6 states the handler should use "the order's delivery address
        as dropoff location" but does not specify how it arrives in the Delivery context.
        The delivery address originates from the OrderPlaced event but is not forwarded
        through OrderReadyForPickup.
      affected_contexts:
        - "Restaurant"
        - "Delivery"
      affected_stories:
        - "RST-007-STORY"
        - "DLV-001-STORY"
      affected_ac_nodes:
        - "RST-007"
        - "DLV-001"
      recommended_resolution: >
        Option A (preferred): Add deliveryAddress to the OrderReadyForPickup event payload
        in the Restaurant context. The Restaurant context already has the delivery address
        from the OrderPlaced event (stored on the RestaurantOrder). Update RST-007 AC node
        to include deliveryAddress in the OrderReadyForPickup payload, and update the
        system-map.yaml, FDD, and ubiquitous-language.yaml accordingly.
        Option B: Have the Delivery context store the delivery address when it receives
        OrderPlaced (add a new subscription), but this creates an additional cross-context
        dependency and timing concern.
    - id: "CRIT-002"
      check: "Check 3 — FDD Business Rule Completeness"
      severity: "critical"
      description: >
        Business rule RST-R06 (Menu item prices must be greater than GBP 0.00 and
        preparation time must be at least 1 minute, validated on menu item creation/update)
        has no corresponding AC node. The FDD defines an UpdateMenuItem command on the Menu
        aggregate (section 4.2), but no AC node covers this command. The system-map.yaml
        includes UpdateMenuItem in the Menu aggregate commands, and the function-topology.yaml
        does not include a dedicated Azure Function for it. RST-R06 is the only business
        rule without AC node coverage.
      affected_contexts:
        - "Restaurant"
      affected_stories: []
      affected_ac_nodes: []
      recommended_resolution: >
        Add a new AC node (e.g. RST-010) covering the UpdateMenuItem command with RST-R06
        validation. This should include: (1) an AC node defining the create/update menu item
        behaviour with price > 0.00 and preparation time >= 1 minute validations,
        (2) a corresponding story, and (3) a routing decision. Also add the Azure Function
        (e.g. UpdateMenuItemFunction) to the function-topology.yaml.
  warning_flags:
    - id: "WARN-001"
      check: "Check 7 — Test Scaffold Consistency"
      severity: "warning"
      description: >
        Layer 3b (test scaffold generation) was skipped. No test scaffold files exist
