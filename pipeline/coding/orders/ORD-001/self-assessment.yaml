        - "PlaceOrder_WhenLineItemHasInvalidPrice_ThrowsInvalidOrderException"
      status: "covered"

    - id: "ORD-001-ERR-04"
      description: "Missing latitude/longitude returns ORDER_INVALID_ADDRESS"
      covered_by: "PlaceOrder_WhenAddressMissingLatitude_ThrowsInvalidOrderException"
      status: "covered"

    - id: "ORD-001-ERR-05"
      description: "Empty customerId returns ORDER_INVALID_CUSTOMER"
      covered_by: "PlaceOrder_WhenCustomerIdIsEmpty_ThrowsInvalidOrderException"
      status: "covered"

    - id: "ORD-001-ERR-06"
      description: "Empty restaurantId returns ORDER_INVALID_RESTAURANT"
      covered_by: "PlaceOrder_WhenRestaurantIdIsEmpty_ThrowsInvalidOrderException"
      status: "covered"

  business_rules_enforced:
    - rule_id: "ORD-R01"
      description: "Minimum order subtotal is GBP 10.00"
      enforcement_location: "PlaceOrderCommandHandler.ValidateRequest()"
      status: "enforced"

    - rule_id: "ORD-R02"
      description: "Maximum 20 line items per order"
      enforcement_location: "PlaceOrderCommandHandler.ValidateRequest()"
      status: "enforced"

    - rule_id: "ORD-R03"
      description: "Delivery address must include latitude and longitude"
      enforcement_location: "PlaceOrderCommandHandler.ValidateRequest()"
      status: "enforced"

    - rule_id: "ORD-R06"
      description: "Order total = subtotal + GBP 2.99 delivery fee"
      enforcement_location: "PlaceOrderCommandHandler.Handle()"
      status: "enforced"

    - rule_id: "ORD-R07"
      description: "Order number format ORD-YYYYMMDD-sequential"
      enforcement_location: "PlaceOrderCommandHandler.Handle()"
      status: "enforced"

  ddd_compliance:
    domain_layer_zero_infrastructure_refs: true
    business_rule_in_aggregate: false
    domain_event_raised_in_aggregate: true
    handler_delegates_to_aggregate: true
    function_only_http_concerns: true

  test_summary:
    total_tests: 14
    aggregate_level_tests: 2
    handler_level_tests: 12
    all_tests_have_real_implementations: true
    mocking_library: "Moq"
    assertion_library: "FluentAssertions"

  known_gaps:
    - description: "Validation rules are in the handler rather than the aggregate because they validate pre-creation request data"
      severity: "low"
      reason: "Request validation must happen before aggregate construction; aggregate cannot validate its own creation inputs"

    - description: "Order number uses GUID-derived suffix instead of sequential database counter"
      severity: "low"
      reason: "True sequential numbering would require a separate counter document in Cosmos DB; GUID suffix provides uniqueness without additional infrastructure"

  overall_confidence: "high"
  notes: >
    All 14 tests have complete Arrange/Act/Assert implementations. Business rules ORD-R01
    through ORD-R04 are validated in the handler before aggregate creation. The Order aggregate
    constructor raises the OrderPlaced domain event. The handler calculates the order total per
    ORD-R06 and generates the order number per ORD-R07. State transition methods for ORD-005
    through ORD-009 were also added to the aggregate in this story as they modify Order.cs.
