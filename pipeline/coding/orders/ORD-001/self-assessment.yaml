  acceptance_criteria_coverage:
    - id: "ORD-001-AC-01"
      description: "A new Order aggregate is created with status Placed"
      covered_by:
        - "PlaceOrder_WithValidData_ReturnsCreatedResultWithPlacedStatus"
        - "OrderConstructor_SetsStatusToPlacedAndRecordsTimestamps"
      status: "covered"

    - id: "ORD-001-AC-02"
      description: "Order total is calculated as subtotal + GBP 2.99 delivery fee"
      covered_by: "PlaceOrder_CalculatesOrderTotal_SubtotalPlusDeliveryFee"
      status: "covered"

    - id: "ORD-001-AC-03"
